<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Animated surgical robot — Kethan Sai Vuppalapati</title>
<desc>A dark-mode animated surgical robot with three articulated arms, endoscope, trocar ports, live endoscope feed, and telemetry panel. All animation uses native SVG SMIL elements compatible with GitHub README rendering.</desc>
<defs>
  <linearGradient id="bg-g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0e0e1a"/>
    <stop offset="100%" stop-color="#060610"/>
  </linearGradient>
  <linearGradient id="tower-g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e1e30"/>
    <stop offset="100%" stop-color="#0d0d18"/>
  </linearGradient>
  <linearGradient id="arm-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1a1a2a"/>
    <stop offset="50%" stop-color="#28283c"/>
    <stop offset="100%" stop-color="#1a1a2a"/>
  </linearGradient>
  <linearGradient id="scope-g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#122012"/>
    <stop offset="100%" stop-color="#090f09"/>
  </linearGradient>
  <linearGradient id="teal-v" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1d9e75" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#1d9e75" stop-opacity="0.05"/>
  </linearGradient>
</defs>

